default:
  - name: test
    run: ".venv/bin/python -m pytest --tb=short -q"
    required: true
    timeout: 120s

columns:
  implementation:
    extend: true
    gates: []
  code-review:
    extend: false
    gates: []
  merge:
    extend: true
    gates:
      - name: test-full
        run: ".venv/bin/python -m pytest --tb=short"
        required: true
        timeout: 120s

settings:
  cwd: .
  env: { CI: "true" }
  total_timeout: 300s
  budget:
    max_input_tokens: 5000000
    max_output_tokens: 1500000
    warn_pct: 75
