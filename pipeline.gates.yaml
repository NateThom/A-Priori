default:
  - name: test
    run: "/opt/apriori-venv/bin/python -m pytest --tb=short -q"
    required: true
    timeout: 120s

columns:
  implementation:
    extend: true
    gates: []
  code-review:
    extend: false
    gates: []
  merge:
    extend: true
    gates:
      - name: test-full
        run: "/opt/apriori-venv/bin/python -m pytest --tb=short"
        required: true
        timeout: 120s

settings:
  cwd: .
  env:
    CI: "true"
    PYTHONPATH: "src"
  total_timeout: 300s
