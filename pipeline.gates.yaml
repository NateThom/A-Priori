default:
  - name: test
    run: "PYTHON_BIN=''; for candidate in /opt/apriori-venv/bin/python .venv/bin/python python3; do if [ -x \"$candidate\" ] && PYTHONPATH=src \"$candidate\" -c 'import fastapi, apriori' >/dev/null 2>&1; then PYTHON_BIN=\"$candidate\"; break; fi; done; [ -n \"$PYTHON_BIN\" ] || { echo 'No gate python with required imports available' >&2; exit 1; }; PYTHONPATH=src \"$PYTHON_BIN\" -m pytest --tb=short -q"
    required: true
    timeout: 120s

columns:
  implementation:
    extend: true
    gates: []
  code-review:
    extend: false
    gates: []
  merge:
    extend: true
    gates:
      - name: test-full
        run: "PYTHON_BIN=''; for candidate in /opt/apriori-venv/bin/python .venv/bin/python python3; do if [ -x \"$candidate\" ] && PYTHONPATH=src \"$candidate\" -c 'import fastapi, apriori' >/dev/null 2>&1; then PYTHON_BIN=\"$candidate\"; break; fi; done; [ -n \"$PYTHON_BIN\" ] || { echo 'No gate python with required imports available' >&2; exit 1; }; PYTHONPATH=src \"$PYTHON_BIN\" -m pytest --tb=short"
        required: true
        timeout: 120s

settings:
  cwd: .
  env:
    CI: "true"
    PYTHONPATH: "src"
  total_timeout: 300s
